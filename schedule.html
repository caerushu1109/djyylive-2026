<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorldCup Pulse | 世界杯赛事中心</title>
    <meta
      name="description"
      content="世界杯赛事中心，聚合焦点赛程、实时入口、筛选器和未来的 standings 与 bracket 结构。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="WorldCup Pulse | 世界杯赛事中心" />
    <meta property="og:description" content="赛事中心优先解决今天看什么、下一场看什么，以及如何快速进入单场页。" />
    <meta property="og:url" content="https://www.worldcuppulse.com/zh/schedule.html" />
    <meta property="og:site_name" content="WorldCup Pulse" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WorldCup Pulse | 世界杯赛事中心" />
    <meta name="twitter:description" content="从这里直接看今天该点开的比赛、完整赛程和单场页。" />
    <link rel="canonical" href="https://www.worldcuppulse.com/zh/schedule.html" />
    <link rel="alternate" hreflang="zh-CN" href="https://www.worldcuppulse.com/zh/schedule.html" />
    <link rel="alternate" hreflang="en" href="https://www.worldcuppulse.com/en/schedule.html" />
    <link rel="alternate" hreflang="x-default" href="https://www.worldcuppulse.com/zh/schedule.html" />
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="stylesheet" href="./styles.css?v=20260312bb" />
  </head>
  <body data-page="schedule" data-locale="zh" data-route-key="schedule">
    <main class="site-shell">
      <header class="masthead masthead--compact">
        <nav class="nav">
          <a class="nav__brand" href="./index.html">WorldCup Pulse</a>
          <div class="nav__links">
            <a href="./index.html">首页</a>
            <a href="./schedule.html" aria-current="page">赛程</a>
            <a href="./history.html">历史</a>
            <a href="./prediction.html">预测</a>
            <a href="./teams.html">球队</a>
            <a href="/en/schedule.html" data-locale-switch>EN</a>
          </div>
        </nav>

        <section class="page-hero history-hero">
          <div class="page-hero__copy">
            <p class="eyebrow">赛事中心</p>
            <h1>赛事中心</h1>
            <p class="hero__lede">先看现在最该点开的比赛，再筛完整赛程。</p>
            <div class="hero__actions">
              <a class="button button--primary" href="#schedule-live-now">先看今天该点哪场</a>
              <a class="button button--ghost" href="#schedule-match-detail">看当前比赛详情</a>
            </div>
          </div>
        </section>

        <nav class="history-subnav">
          <a href="./schedule.html" aria-current="page">赛事页</a>
          <a href="#schedule-match-detail">当前比赛</a>
        </nav>
      </header>

      <section class="section schedule-hub">
        <article class="history-panel">
          <div class="section__heading section__heading--stack">
            <div>
              <p class="eyebrow">直播中</p>
              <h2>进行中的比赛</h2>
            </div>
          </div>
          <div id="schedule-live-now"></div>
        </article>

        <article class="history-panel">
          <div class="section__heading section__heading--stack">
            <div>
              <p class="eyebrow">下一场</p>
              <h2>即将开始</h2>
            </div>
          </div>
          <div id="schedule-upcoming"></div>
        </article>
      </section>

      <section class="section">
        <div class="section__heading">
          <div>
            <p class="eyebrow">筛选</p>
            <h2>赛程筛选器</h2>
          </div>
          <p class="section__intro">按球队和状态筛掉无关比赛。</p>
        </div>

        <div class="filter-bar" id="schedule-filters" role="tablist" aria-label="Schedule stages"></div>
        <div class="explorer-controls">
          <label class="selector-card">
            <span>球队</span>
            <select id="schedule-team-select"></select>
          </label>
          <label class="selector-card">
            <span>状态</span>
            <select id="schedule-status-select"></select>
          </label>
        </div>
        <div class="schedule-stack" id="schedule-list"></div>
      </section>

      <section class="section match-layout" id="schedule-match-detail">
        <article class="history-panel">
          <div class="section__heading section__heading--stack">
            <div>
              <p class="eyebrow" id="schedule-match-timeline-eyebrow">关键事件</p>
              <h2 id="schedule-match-timeline-title">当前比赛</h2>
            </div>
          </div>
          <section id="schedule-match-hero"></section>
          <div class="event-stack" id="schedule-match-timeline"></div>
        </article>

        <aside class="history-panel">
          <div class="section__heading section__heading--stack">
            <div>
              <p class="eyebrow" id="schedule-match-stats-eyebrow">技术统计</p>
              <h2 id="schedule-match-stats-title">比赛数据</h2>
            </div>
          </div>
          <div class="stat-tiles" id="schedule-match-stats"></div>
        </aside>
      </section>

    </main>

    <script type="module" src="./src/app.js?v=20260312bb"></script>
  </body>
</html>
