<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorldCup Pulse | 单队世界杯档案</title>
    <meta
      name="description"
      content="查看单支球队的世界杯历史、全部比赛、关键统计与 ELO 曲线。"
    />
    <link rel="canonical" href="https://www.worldcuppulse.com/zh/team-history.html" />
    <link rel="alternate" hreflang="zh-CN" href="https://www.worldcuppulse.com/zh/team-history.html" />
    <link rel="alternate" hreflang="en" href="https://www.worldcuppulse.com/en/team-history.html" />
    <link rel="alternate" hreflang="x-default" href="https://www.worldcuppulse.com/zh/team-history.html" />
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="stylesheet" href="./styles.css?v=20260312j" />
  </head>
  <body data-page="team-history" data-locale="zh" data-route-key="teamHistory">
    <main class="site-shell">
      <header class="masthead masthead--compact">
        <nav class="nav">
          <a class="nav__brand" href="./index.html">WorldCup Pulse</a>
          <div class="nav__links">
            <a href="./index.html">首页</a>
            <a href="./schedule.html">赛程</a>
            <a href="./history.html">历史</a>
            <a href="./prediction.html">预测</a>
            <a href="./teams.html" aria-current="page">球队</a>
            <a href="/en/team-history.html" data-locale-switch>EN</a>
          </div>
        </nav>

        <section class="page-hero history-hero">
          <div class="page-hero__copy">
            <p class="eyebrow">球队</p>
            <h1>球队详情</h1>
          </div>
        </section>
      </header>

      <section class="section">
        <div class="selector-grid">
          <label class="selector-card">
            <span>选择球队</span>
            <select id="team-history-select"></select>
          </label>
          <label class="selector-card">
            <span>比赛排序</span>
            <select id="team-history-sort">
              <option value="date-desc">按时间倒序</option>
              <option value="elo-gap">按 ELO 差排序</option>
              <option value="swing">按波动排序</option>
              <option value="goals">按总进球排序</option>
            </select>
          </label>
        </div>
      </section>

      <section class="section section--split">
        <div class="history-panel">
          <div class="section__heading section__heading--stack">
            <div>
              <p class="eyebrow">球队概况</p>
              <h2>先看球队概况</h2>
            </div>
          </div>
          <div id="team-history-summary"></div>
        </div>

        <div class="sidebar-stack">
          <article class="history-panel">
            <div class="curve-card">
              <div class="curve-card__meta" id="team-history-curve-meta"></div>
              <div class="curve-chart" id="team-history-curve"></div>
            </div>
          </article>
          <article class="history-panel">
            <div class="section__heading section__heading--stack">
              <div>
                <p class="eyebrow">相关内容</p>
                <h2>继续看</h2>
              </div>
            </div>
            <ul class="spotlight-list" id="team-history-links"></ul>
          </article>
        </div>
      </section>

      <div class="mobile-more" id="page-mobile-more">
        <button class="mobile-more__button" type="button" aria-expanded="false">展开更多内容</button>
      </div>

      <section class="section section--alt mobile-secondary">
        <div class="section__heading">
          <div>
            <p class="eyebrow">全部比赛</p>
            <h2>全部比赛</h2>
          </div>
          <p class="section__intro">可以切排序快速找名场面，也可以从头完整回看。</p>
        </div>
        <div class="explorer-list" id="team-history-matches"></div>
      </section>
    </main>

    <script type="module" src="./src/app.js?v=20260312j"></script>
  </body>
</html>
