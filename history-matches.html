<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorldCup Pulse | 世界杯比赛与时间线</title>
    <meta
      name="description"
      content="世界杯比赛专题，包含历届冠军时间线、事件密度、点球大战、纪律名场面和历史比赛浏览器。"
    />
    <link rel="canonical" href="https://www.worldcuppulse.com/zh/history-matches.html" />
    <link rel="alternate" hreflang="zh-CN" href="https://www.worldcuppulse.com/zh/history-matches.html" />
    <link rel="alternate" hreflang="en" href="https://www.worldcuppulse.com/en/history-matches.html" />
    <link rel="alternate" hreflang="x-default" href="https://www.worldcuppulse.com/zh/history-matches.html" />
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="stylesheet" href="./styles.css?v=20260312i" />
  </head>
  <body data-page="history-matches" data-locale="zh" data-route-key="historyMatches">
    <main class="site-shell">
      <header class="masthead masthead--compact">
        <nav class="nav">
          <a class="nav__brand" href="./index.html">WorldCup Pulse</a>
          <div class="nav__links">
            <a href="./index.html">首页</a>
            <a href="./schedule.html">赛程</a>
            <a href="./history.html" aria-current="page">历史</a>
            <a href="./prediction.html">预测</a>
            <a href="./teams.html">球队</a>
            <a href="/en/history-matches.html" data-locale-switch>EN</a>
          </div>
        </nav>

        <section class="page-hero">
          <div class="page-hero__copy">
            <p class="eyebrow">比赛与时间线</p>
            <h1>比赛与时间线</h1>
            <p class="hero__lede">这里集中看冠军时间线、事件密度和历史比赛浏览器。</p>
          </div>
        </section>

        <nav class="history-subnav">
          <a href="./history.html">历史首页</a>
          <a href="./history-upsets.html">冷门与ELO</a>
          <a href="./history-archive.html">资料库</a>
          <a href="./history-players.html">人物</a>
          <a href="./history-matches.html" aria-current="page">比赛</a>
        </nav>
      </header>

      <section class="section history-profile-layout">
        <article class="history-panel">
          <div class="section__heading section__heading--stack">
            <div>
              <p class="eyebrow">冠军时间线</p>
              <h2>历届冠军时间线</h2>
            </div>
          </div>
          <div class="timeline-grid timeline-grid--compact" id="history-timeline"></div>
        </article>

        <aside class="history-panel">
          <div class="section__heading section__heading--stack">
            <div>
              <p class="eyebrow">事件密度</p>
              <h2>事件密度</h2>
            </div>
          </div>
          <div class="section-summary" id="event-summary-note"></div>
          <div id="archive-goal-tournaments"></div>
          <div class="archive-subpanel" id="archive-milestone-goals"></div>
        </aside>
      </section>

      <section class="section history-dual">
        <div class="history-panel">
          <div class="section__heading section__heading--stack">
            <div>
              <p class="eyebrow">点球大战</p>
              <h2>点球大战档案</h2>
            </div>
          </div>
          <div id="archive-shootouts"></div>
        </div>

        <div class="history-panel">
          <div class="section__heading section__heading--stack">
            <div>
              <p class="eyebrow">纪律名场面</p>
              <h2>纪律名场面</h2>
            </div>
          </div>
          <div id="archive-cards"></div>
        </div>
      </section>

      <section class="section section--alt">
        <div class="section__heading">
          <div>
            <p class="eyebrow">比赛浏览器</p>
            <h2>历史比赛浏览器</h2>
          </div>
        </div>
        <div class="explorer-controls">
          <label class="selector-card">
            <span>年份</span>
            <select id="explorer-year"></select>
          </label>
          <label class="selector-card">
            <span>球队</span>
            <select id="explorer-team"></select>
          </label>
          <label class="selector-card">
            <span>类型</span>
            <select id="explorer-upset"></select>
          </label>
          <label class="selector-card">
            <span>排序</span>
            <select id="explorer-sort"></select>
          </label>
        </div>
        <div class="explorer-meta" id="explorer-meta"></div>
        <div class="explorer-list" id="history-explorer"></div>
      </section>

    </main>

    <script type="module" src="./src/app.js?v=20260312i"></script>
  </body>
</html>
