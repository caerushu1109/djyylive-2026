<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorldCup Pulse | 世界杯球队首页</title>
    <meta
      name="description"
      content="世界杯球队首页，展示豪门入口、球队概览、精选曲线与单队详情入口。"
    />
    <link rel="canonical" href="https://www.worldcuppulse.com/zh/teams.html" />
    <link rel="alternate" hreflang="zh-CN" href="https://www.worldcuppulse.com/zh/teams.html" />
    <link rel="alternate" hreflang="en" href="https://www.worldcuppulse.com/en/teams.html" />
    <link rel="alternate" hreflang="x-default" href="https://www.worldcuppulse.com/zh/teams.html" />
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="stylesheet" href="./styles.css?v=20260312h" />
  </head>
  <body data-page="teams-hub" data-locale="zh" data-route-key="teams">
    <main class="site-shell">
      <header class="masthead masthead--compact">
        <nav class="nav">
          <a class="nav__brand" href="./index.html">WorldCup Pulse</a>
          <div class="nav__links">
            <a href="./index.html">首页</a>
            <a href="./schedule.html">赛程</a>
            <a href="./history.html">历史</a>
            <a href="./prediction.html">预测</a>
            <a href="./teams.html" aria-current="page">球队</a>
            <a href="/en/teams.html" data-locale-switch>EN</a>
          </div>
        </nav>

        <section class="page-hero history-hero">
          <div class="page-hero__copy">
            <p class="eyebrow">球队</p>
            <h1>先找到你关心的球队</h1>
            <div class="hero__actions">
              <a class="button button--primary" href="./team-history.html?team=Argentina">先看阿根廷</a>
              <a class="button button--ghost" href="./team-history.html?team=Brazil">再看巴西</a>
            </div>
          </div>
        </section>
      </header>

      <section class="section">
        <div class="section__heading">
          <div>
            <p class="eyebrow">豪门入口</p>
            <h2>豪门入口</h2>
          </div>
        </div>
        <div class="feature-grid history-pillars" id="teams-hub-grid"></div>
      </section>

      <section class="section section--split">
        <div class="history-panel">
          <div class="section__heading section__heading--stack">
            <div>
              <p class="eyebrow">球队概览</p>
              <h2>先看这支队的概况</h2>
            </div>
          </div>
          <label class="selector-card selector-card--history">
            <span>选择球队</span>
            <select id="teams-hub-select"></select>
          </label>
          <div id="teams-hub-profile"></div>
        </div>

        <div class="sidebar-stack">
          <article class="history-panel">
            <div class="section__heading section__heading--stack">
              <div>
                <p class="eyebrow">关键信息</p>
                <h2>先记住这些</h2>
              </div>
            </div>
            <div class="summary-strip" id="teams-hub-facts"></div>
          </article>
          <article class="history-panel">
            <div class="section__heading section__heading--stack">
              <div>
                <p class="eyebrow">相关入口</p>
                <h2>继续看</h2>
              </div>
            </div>
            <div class="schedule-stack" id="teams-hub-links"></div>
          </article>
        </div>
      </section>

      <div class="mobile-more" id="page-mobile-more">
        <button class="mobile-more__button" type="button" aria-expanded="false">展开更多内容</button>
      </div>

      <section class="section mobile-secondary">
        <div class="section__heading">
          <div>
            <p class="eyebrow">ELO 曲线</p>
            <h2>豪门曲线</h2>
          </div>
        </div>
        <div class="curve-layout">
          <label class="selector-card selector-card--history">
            <span>查看球队</span>
            <select id="teams-hub-curve-select"></select>
          </label>
          <div class="curve-card">
            <div class="curve-card__meta" id="teams-hub-curve-meta"></div>
            <div class="curve-chart" id="teams-hub-curve"></div>
          </div>
        </div>
      </section>

    </main>

    <script type="module" src="./src/app.js?v=20260312h"></script>
  </body>
</html>
