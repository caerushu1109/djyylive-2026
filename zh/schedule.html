<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorldCup Pulse | 跳转到 2026 页面</title>
    <meta name="description" content="赛程已并入 2026 主页面，正在为你跳转。" />
    <meta http-equiv="refresh" content="0; url=./index.html#home-schedule-list" />
    <link rel="canonical" href="https://www.worldcuppulse.com/zh/index.html" />
  </head>
  <body>
    <script>
      const url = new URL(window.location.href);
      const target = new URL("./index.html", url);
      url.searchParams.forEach((value, key) => target.searchParams.set(key, value));
      target.hash = "home-schedule-list";
      window.location.replace(target.toString());
    </script>
  </body>
</html>
