<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorldCup Pulse | 世界杯赛事中心</title>
    <meta
      name="description"
      content="世界杯赛事中心，聚合焦点赛程、实时入口、筛选器和后续 standings 与 bracket 结构。"
    />
    <link rel="canonical" href="https://www.worldcuppulse.com/zh/schedule.html" />
    <link rel="alternate" hreflang="zh-CN" href="https://www.worldcuppulse.com/zh/schedule.html" />
    <link rel="alternate" hreflang="en" href="https://www.worldcuppulse.com/en/schedule.html" />
    <link rel="alternate" hreflang="x-default" href="https://www.worldcuppulse.com/zh/schedule.html" />
    <link rel="manifest" href="../site.webmanifest" />
    <link rel="stylesheet" href="../styles.css?v=20260312u" />
  </head>
  <body data-page="schedule" data-locale="zh" data-route-key="schedule">
    <main class="site-shell">
      <header class="masthead masthead--compact">
        <nav class="nav">
          <a class="nav__brand" href="./index.html">WorldCup Pulse</a>
          <div class="nav__links">
            <a href="./index.html">首页</a>
            <a href="./schedule.html" aria-current="page">赛程</a>
            <a href="./history.html">历史</a>
            <a href="./prediction.html">预测</a>
            <a href="./teams.html">球队</a>
            <a href="/en/schedule.html" data-locale-switch>EN</a>
          </div>
        </nav>

        <section class="page-hero history-hero">
          <div class="page-hero__copy">
            <p class="eyebrow">赛事中心</p>
            <h1>赛事中心</h1>
            <p class="hero__lede">先看进行中和下一场，再筛掉无关比赛。</p>
            <div class="hero__actions">
              <a class="button button--primary" href="./live.html">先看今日比赛</a>
              <a class="button button--ghost" href="./match.html">看一场比赛详情</a>
            </div>
          </div>
        </section>

        <nav class="history-subnav">
          <a href="./schedule.html" aria-current="page">赛事中心</a>
          <a href="./live.html">今日比赛</a>
          <a href="./match.html">比赛详情</a>
        </nav>
      </header>

      <section class="section schedule-hub">
        <article class="history-panel">
          <div class="section__heading section__heading--stack">
            <div>
              <p class="eyebrow">正在进行</p>
              <h2>进行中的比赛</h2>
            </div>
          </div>
          <div id="schedule-live-now"></div>
        </article>

        <article class="history-panel">
          <div class="section__heading section__heading--stack">
            <div>
              <p class="eyebrow">即将开始</p>
              <h2>即将开始</h2>
            </div>
          </div>
          <div id="schedule-upcoming"></div>
        </article>
      </section>

      <section class="section">
        <div class="section__heading">
          <div>
            <p class="eyebrow">筛选</p>
            <h2>赛程筛选器</h2>
          </div>
          <p class="section__intro">先筛到你关心的球队和状态。</p>
        </div>

        <div class="filter-bar" id="schedule-filters" role="tablist" aria-label="Schedule stages"></div>
        <div class="explorer-controls">
          <label class="selector-card">
            <span>球队</span>
            <select id="schedule-team-select"></select>
          </label>
          <label class="selector-card">
            <span>状态</span>
            <select id="schedule-status-select"></select>
          </label>
        </div>
        <div class="schedule-stack" id="schedule-list"></div>
      </section>

      <section class="section section--split">
        <article class="prediction-panel">
          <p class="eyebrow">相关内容</p>
          <h2>顺着这页继续往下走</h2>
          <ul class="spotlight-list">
            <li><strong>今日比赛：</strong><a href="./live.html">集中看进行中和关注列表</a></li>
            <li><strong>单场详情：</strong><a href="./match.html">进入事件流和技术统计</a></li>
            <li><strong>球队视角：</strong><a href="./team-history.html?team=Argentina">从球队页看相关比赛</a></li>
          </ul>
        </article>
      </section>
    </main>

    <script type="module" src="../src/app.js?v=20260312u"></script>
  </body>
</html>
