<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorldCup Pulse | 单场比赛详情</title>
    <meta
      name="description"
      content="世界杯单场比赛详情页，展示比分、事件流、技术统计和相关页面入口。"
    />
    <link rel="canonical" href="https://www.worldcuppulse.com/zh/match.html" />
    <link rel="alternate" hreflang="zh-CN" href="https://www.worldcuppulse.com/zh/match.html" />
    <link rel="alternate" hreflang="en" href="https://www.worldcuppulse.com/en/match.html" />
    <link rel="alternate" hreflang="x-default" href="https://www.worldcuppulse.com/zh/match.html" />
    <link rel="manifest" href="../site.webmanifest" />
    <link rel="stylesheet" href="../styles.css?v=20260312t" />
  </head>
  <body data-page="match" data-locale="zh" data-route-key="match">
    <main class="site-shell">
      <header class="masthead masthead--compact">
        <nav class="nav">
          <a class="nav__brand" href="./index.html">WorldCup Pulse</a>
          <div class="nav__links">
            <a href="./index.html">首页</a>
            <a href="./schedule.html">赛程</a>
            <a href="./live.html">Live</a>
            <a href="./history.html">历史</a>
            <a href="./prediction.html">预测</a>
            <a href="./team-history.html">球队档案</a>
            <a href="/en/match.html" data-locale-switch>EN</a>
          </div>
        </nav>

        <section class="page-hero history-hero">
          <div class="page-hero__copy">
            <p class="eyebrow">比赛详情</p>
            <h1>比赛详情</h1>
            <p class="hero__lede">赛前看比赛信息和对阵，开赛后看事件流，赛后看数据。</p>
          </div>
        </section>

        <nav class="history-subnav">
          <a href="./schedule.html">赛事中心</a>
          <a href="./live.html">今日比赛</a>
          <a href="./match.html" aria-current="page">比赛详情</a>
        </nav>
      </header>

      <section class="section" id="match-hero"></section>

      <section class="section match-layout">
        <article class="history-panel">
          <div class="section__heading section__heading--stack">
            <div>
              <p class="eyebrow">关键事件</p>
              <h2>比赛事件流</h2>
            </div>
          </div>
          <div class="event-stack" id="match-timeline"></div>
        </article>

        <aside class="history-panel">
          <div class="section__heading section__heading--stack">
            <div>
              <p class="eyebrow">技术统计</p>
              <h2>技术统计</h2>
            </div>
          </div>
          <div class="stat-tiles" id="match-stats"></div>
        </aside>
      </section>

      <section class="section section--split">
        <article class="prediction-panel">
          <p class="eyebrow">相关内容</p>
          <h2>看完这场，还可以往哪走</h2>
          <ul class="spotlight-list">
            <li><strong>赛前：</strong><a href="./prediction.html">回到预测页</a> 看模型怎么看这场对决</li>
            <li><strong>历史：</strong><a href="./history-upsets.html">回到冷门专题</a> 看这场是否会变成历史样本</li>
            <li><strong>球队：</strong><a href="./team-history.html?team=Argentina">查看球队详情</a> 看长期战绩</li>
          </ul>
        </article>

        <article class="spotlight-card">
          <p class="eyebrow">关联入口</p>
          <h2>关联入口</h2>
          <div class="history-links" id="match-related"></div>
        </article>
      </section>

    </main>

    <script type="module" src="../src/app.js?v=20260312t"></script>
  </body>
</html>
