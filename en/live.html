<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorldCup Pulse | Redirecting to Schedule</title>
    <meta name="description" content="The live overview has been merged into the schedule page. Redirecting now." />
    <meta http-equiv="refresh" content="0; url=./schedule.html" />
    <link rel="canonical" href="https://www.worldcuppulse.com/en/schedule.html" />
  </head>
  <body>
    <script>
      const url = new URL(window.location.href);
      const target = new URL("./schedule.html", url);
      url.searchParams.forEach((value, key) => target.searchParams.set(key, value));
      window.location.replace(target.toString());
    </script>
  </body>
</html>
