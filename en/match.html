<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WorldCup Pulse | Redirecting to schedule detail</title>
    <meta name="description" content="Match detail is now part of the schedule page. Redirecting now." />
    <meta http-equiv="refresh" content="0; url=./index.html#schedule-match-detail" />
    <link rel="canonical" href="https://www.worldcuppulse.com/en/index.html" />
  </head>
  <body>
    <script>
      const url = new URL(window.location.href);
      const target = new URL("./index.html", url);
      url.searchParams.forEach((value, key) => target.searchParams.set(key, value));
      target.hash = "schedule-match-detail";
      window.location.replace(target.toString());
    </script>
  </body>
</html>
