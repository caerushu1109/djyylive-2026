name: Daily Elo Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  update-elo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare environment
        run: |
          echo "SPORTMONKS_API_TOKEN=${SPORTMONKS_API_TOKEN}" >> .env.local
        env:
          SPORTMONKS_API_TOKEN: ${{ secrets.SPORTMONKS_API_TOKEN }}

      - name: Update Elo snapshot and predictions
        run: python3 scripts/update_elo_from_eloratings.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/elo.json public/data/predictions.json public/data/elo-trends.json public/data/worldcup-teams.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update elo snapshot"
          git push
